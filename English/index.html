<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文五大句型：極難 25 題挑戰賽</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>英文五大句型：極難 25 題挑戰賽</h1>
        <p class="subtitle">考驗你的「受詞、補語、修飾語」核心解構能力🔥</p>
    </header>

    <div class="intro-box">
        <strong>💡 句型代號說明：</strong><br>
        • <b>S + V</b> (主詞 + 不完全不及物動詞)<br>
        • <b>S + V + C</b> (主詞 + 不完全不及物動詞 + 主詞補語)<br>
        • <b>S + V + O</b> (主詞 + 完全及物動詞 + 受詞)<br>
        • <b>S + V + O + O</b> (主詞 + 完全及物動詞 + 間接受詞 + 直接受詞)<br>
        • <b>S + V + O + C</b> (主詞 + 不完全及物動詞 + 受詞 + 受詞補語)
    </div>

    <div id="result-panel">
        <h2>🎉 測試完成！</h2>
        <div id="score-display">0 / 25</div>
        <p id="commentary"></p>
    </div>

    <form id="quiz-form">
        <div id="questions-container"></div>

        <div class="action-area">
            <button type="button" id="submit-btn" class="btn">提交答案，查看解析</button>
        </div>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
